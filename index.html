<style>
:root {
  --gold: #C9A84C; --gold-light: #E8C56A; --gold-dark: #8B6914;
  --black: #0a0a0a; --black-2: #111; --black-3: #1a1a1a; --black-4: #222;
  --white: #f5f5f0; --red: #c0392b; --green: #27ae60;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--black);color:var(--white);overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:var(--gold);border-radius:2px;}

.page{display:none;min-height:100vh;}
.page.active{display:block;}

#t-overlay{position:fixed;inset:0;z-index:9999;background:var(--black);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;opacity:0;pointer-events:none;transition:opacity 0.3s;}
#t-overlay.show{opacity:1;pointer-events:all;}
.t-logo{width:70px;height:70px;border-radius:50%;border:2px solid var(--gold);overflow:hidden;}
.t-logo img{width:100%;height:100%;object-fit:cover;}
.t-text{font-family:'Cinzel',serif;font-size:10px;letter-spacing:5px;color:var(--gold);}
.t-bar{width:100px;height:2px;background:rgba(201,168,76,0.2);border-radius:2px;overflow:hidden;}
.t-bar-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width 0.6s ease;}

#notif{position:fixed;top:20px;right:20px;z-index:9998;background:var(--black-2);border:1px solid var(--gold);padding:14px 20px;font-size:13px;opacity:0;transform:translateY(-10px);transition:all 0.3s;pointer-events:none;max-width:300px;}
#notif.show{opacity:1;transform:translateY(0);}
#notif.ok{border-color:var(--green);}

.nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:0 60px;height:70px;background:rgba(10,10,10,0.95);border-bottom:1px solid rgba(201,168,76,0.12);}
.nav-logo{display:flex;align-items:center;gap:12px;cursor:pointer;}
.nav-logo img{width:44px;height:44px;border-radius:50%;border:2px solid var(--gold);}
.nav-logo-text{font-family:'Cinzel',serif;font-size:12px;font-weight:700;letter-spacing:3px;color:var(--gold);line-height:1.3;}
.nav-links{display:flex;gap:36px;align-items:center;}
.nav-links a{color:var(--white);text-decoration:none;font-size:11px;letter-spacing:2px;text-transform:uppercase;transition:color 0.3s;cursor:pointer;}
.nav-links a:hover{color:var(--gold);}
.btn-gold{background:transparent;border:1px solid var(--gold);color:var(--gold);padding:10px 24px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;transition:all 0.3s;}
.btn-gold:hover{background:var(--gold);color:var(--black);}
.btn-solid{background:var(--gold);color:var(--black);padding:14px 36px;font-size:11px;letter-spacing:3px;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all 0.3s;clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));}
.btn-solid:hover{background:var(--gold-light);transform:translateY(-2px);}

.hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:100px 60px 60px;}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 40%,rgba(201,168,76,0.07) 0%,transparent 70%);}
.hero-grid{position:absolute;inset:0;opacity:0.025;background-image:linear-gradient(var(--gold) 1px,transparent 1px),linear-gradient(90deg,var(--gold) 1px,transparent 1px);background-size:60px 60px;}
.hero-inner{position:relative;z-index:2;display:flex;align-items:center;gap:80px;max-width:1200px;width:100%;}
.hero-text{flex:1;}
.hero-eyebrow{display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(201,168,76,0.4);padding:7px 18px;margin-bottom:28px;font-size:9px;letter-spacing:4px;color:var(--gold);text-transform:uppercase;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(70px,9vw,130px);line-height:0.88;color:var(--white);margin-bottom:8px;}
.hero-title span{color:var(--gold);}
.hero-sub{font-family:'Cinzel',serif;font-size:clamp(13px,2vw,18px);letter-spacing:8px;color:var(--gold);text-transform:uppercase;margin-bottom:28px;}
.hero-desc{font-size:15px;line-height:1.8;color:rgba(245,245,240,0.55);max-width:460px;margin-bottom:44px;}
.hero-cta{display:flex;gap:20px;align-items:center;flex-wrap:wrap;}
.hero-logo{flex-shrink:0;width:300px;height:300px;border-radius:50%;border:2px solid rgba(201,168,76,0.25);display:flex;align-items:center;justify-content:center;animation:spin-slow 20s linear infinite;}
.hero-logo img{width:270px;height:270px;border-radius:50%;filter:drop-shadow(0 0 24px rgba(201,168,76,0.3));}
@keyframes spin-slow{to{transform:rotate(360deg);}}

.stats{display:flex;border-top:1px solid rgba(201,168,76,0.12);border-bottom:1px solid rgba(201,168,76,0.12);background:var(--black-2);}
.stat{flex:1;padding:36px 40px;border-right:1px solid rgba(201,168,76,0.12);text-align:center;}
.stat:last-child{border-right:none;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--gold);line-height:1;}
.stat-label{font-size:9px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,245,240,0.4);margin-top:6px;}

.section{padding:90px 60px;max-width:1200px;margin:0 auto;}
.sec-label{font-size:9px;letter-spacing:5px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.sec-label::before{content:'';width:28px;height:1px;background:var(--gold);}
.sec-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(44px,6vw,78px);line-height:0.92;margin-bottom:16px;}
.sec-title span{color:var(--gold);}

.sobre-grid{display:grid;grid-template-columns:1fr 1fr;gap:70px;align-items:center;margin-top:50px;}
.sobre-text p{font-size:14px;line-height:1.9;color:rgba(245,245,240,0.6);margin-bottom:18px;}
.sobre-cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.s-card{background:var(--black-3);border:1px solid rgba(201,168,76,0.12);padding:24px;position:relative;transition:border-color 0.3s;}
.s-card:hover{border-color:rgba(201,168,76,0.4);}
.s-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--gold);}
.s-card-icon{font-size:26px;margin-bottom:10px;}
.s-card-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);margin-bottom:6px;}
.s-card-text{font-size:11px;color:rgba(245,245,240,0.45);line-height:1.6;}

.mod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:50px;}
.mod-card{background:var(--black-3);padding:36px 26px;border:1px solid rgba(201,168,76,0.06);transition:all 0.3s;position:relative;overflow:hidden;}
.mod-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--gold);transform:scaleX(0);transition:transform 0.3s;}
.mod-card:hover{background:var(--black-4);border-color:rgba(201,168,76,0.25);}
.mod-card:hover::after{transform:scaleX(1);}
.mod-icon{font-size:36px;margin-bottom:16px;}
.mod-title{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);margin-bottom:10px;}
.mod-desc{font-size:12px;color:rgba(245,245,240,0.45);line-height:1.7;}

.hor-table{width:100%;border-collapse:collapse;margin-top:50px;font-size:13px;}
.hor-table th{background:var(--gold);color:var(--black);padding:12px 18px;text-align:left;font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;}
.hor-table td{padding:12px 18px;border-bottom:1px solid rgba(201,168,76,0.07);color:rgba(245,245,240,0.65);}
.hor-table tr:hover td{background:rgba(201,168,76,0.03);}
.bnivel{display:inline-block;padding:2px 8px;font-size:8px;letter-spacing:2px;text-transform:uppercase;border-radius:2px;}
.bnivel.all{background:rgba(150,150,150,0.15);color:#999;}
.bnivel.ini{background:rgba(39,174,96,0.15);color:#27ae60;}
.bnivel.mid{background:rgba(201,168,76,0.15);color:var(--gold);}
.bnivel.adv{background:rgba(192,57,43,0.15);color:#c0392b;}

.cta-sec{padding:90px 60px;background:var(--black-2);border-top:1px solid rgba(201,168,76,0.12);text-align:center;}
footer{padding:36px 60px;border-top:1px solid rgba(201,168,76,0.08);display:flex;justify-content:space-between;align-items:center;}
.foot-copy{font-size:10px;color:rgba(245,245,240,0.25);letter-spacing:1px;}
.foot-brand{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:3px;}

#page-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--black);padding:20px;}
.login-box{width:100%;max-width:420px;background:var(--black-2);border:1px solid rgba(201,168,76,0.22);padding:48px 40px;}
.login-logo-wrap{text-align:center;margin-bottom:32px;}
.login-logo-wrap img{width:72px;height:72px;border-radius:50%;border:2px solid var(--gold);filter:drop-shadow(0 0 12px rgba(201,168,76,0.35));}
.login-brand{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:3px;margin-top:12px;}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:34px;text-align:center;margin-bottom:6px;}
.login-sub{font-size:10px;color:rgba(245,245,240,0.35);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
.fgroup{margin-bottom:18px;}
.flabel{display:block;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:7px;font-weight:600;}
.finput{width:100%;padding:13px 14px;background:var(--black-3);border:1px solid rgba(201,168,76,0.18);color:var(--white);font-size:14px;font-family:'Inter',sans-serif;transition:border-color 0.3s;outline:none;}
.finput:focus{border-color:var(--gold);}
.finput::placeholder{color:rgba(245,245,240,0.18);}
.btn-full{width:100%;padding:15px;background:var(--gold);color:var(--black);font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'Inter',sans-serif;font-weight:700;border:none;cursor:pointer;transition:all 0.3s;margin-top:8px;}
.btn-full:hover{background:var(--gold-light);}
.btn-full:disabled{opacity:0.5;cursor:not-allowed;}
.login-err{color:var(--red);font-size:11px;text-align:center;margin-top:10px;display:none;}
.login-back{display:block;text-align:center;margin-top:18px;font-size:10px;color:rgba(245,245,240,0.25);cursor:pointer;letter-spacing:1px;transition:color 0.3s;}
.login-back:hover{color:var(--gold);}

.dash-layout{display:flex;min-height:100vh;}
.sidebar{width:260px;flex-shrink:0;background:var(--black-2);border-right:1px solid rgba(201,168,76,0.1);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:90;overflow-y:auto;}
.sb-logo{display:flex;align-items:center;gap:12px;padding:24px;border-bottom:1px solid rgba(201,168,76,0.08);}
.sb-logo img{width:40px;height:40px;border-radius:50%;border:1px solid var(--gold);}
.sb-logo-text{font-family:'Cinzel',serif;font-size:10px;color:var(--gold);letter-spacing:2px;}
.sb-nav{flex:1;padding:10px 0;}
.sb-section{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,245,240,0.2);padding:16px 20px 6px;}
.sb-item{display:flex;align-items:center;gap:12px;padding:11px 20px;cursor:pointer;font-size:13px;color:rgba(245,245,240,0.45);transition:all 0.18s;position:relative;-webkit-tap-highlight-color:transparent;}
.sb-item:hover{color:var(--white);background:rgba(201,168,76,0.04);}
.sb-item.active{color:var(--gold);background:rgba(201,168,76,0.07);}
.sb-item.active::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--gold);}
.sb-icon{font-size:17px;width:20px;text-align:center;}
.sb-foot{padding:18px 20px;border-top:1px solid rgba(201,168,76,0.08);}
.u-info{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.u-avatar{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--black);font-size:14px;flex-shrink:0;}
.u-name{font-size:12px;font-weight:500;}
.u-role{font-size:9px;color:var(--gold);letter-spacing:1px;}
.btn-logout{width:100%;padding:9px;background:transparent;border:1px solid rgba(201,168,76,0.18);color:rgba(245,245,240,0.35);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.3s;font-family:'Inter',sans-serif;}
.btn-logout:hover{border-color:var(--gold);color:var(--gold);}

.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:89;opacity:0;pointer-events:none;transition:opacity 0.3s;backdrop-filter:blur(2px);display:none;}
.sb-overlay.on{opacity:1;pointer-events:all;}
.mob-top{display:none;position:fixed;top:0;left:0;right:0;height:54px;z-index:88;background:var(--black-2);border-bottom:1px solid rgba(201,168,76,0.15);align-items:center;justify-content:space-between;padding:0 14px;}
.mob-top-title{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:3px;position:absolute;left:50%;transform:translateX(-50%);}
.ham{display:flex;flex-direction:column;justify-content:center;gap:5px;width:36px;height:36px;cursor:pointer;background:none;border:none;-webkit-tap-highlight-color:transparent;}
.ham span{display:block;width:22px;height:2px;background:var(--gold);transition:all 0.28s;border-radius:2px;}
.ham.open span:nth-child(1){transform:rotate(45deg) translate(5px,5px);}
.ham.open span:nth-child(2){opacity:0;}
.ham.open span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px);}

.mob-bot{display:none;position:fixed;bottom:0;left:0;right:0;z-index:88;background:var(--black-2);border-top:1px solid rgba(201,168,76,0.15);padding:6px 0 max(6px,env(safe-area-inset-bottom));}
.mob-bot-items{display:flex;justify-content:space-around;}
.mob-bot-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 8px;cursor:pointer;min-width:52px;color:rgba(245,245,240,0.3);font-size:9px;letter-spacing:0.5px;text-transform:uppercase;transition:color 0.2s;border-radius:6px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;}
.mob-bot-item:active{background:rgba(201,168,76,0.1);}
.mob-bot-item.active{color:var(--gold);}
.mob-bot-icon{font-size:21px;line-height:1;}

.dash-main{flex:1;margin-left:260px;padding:40px 44px;min-height:100vh;}
.dash-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:36px;flex-wrap:wrap;gap:8px;}
.dash-title{font-family:'Bebas Neue',sans-serif;font-size:40px;line-height:1;}
.dash-title span{color:var(--gold);}
.dash-date{font-size:11px;color:rgba(245,245,240,0.28);letter-spacing:1px;}

.dview{display:none;}
.dview.active{display:block;}

.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:24px;}
.cards-3{grid-template-columns:repeat(3,1fr);}
.card{background:var(--black-2);border:1px solid rgba(201,168,76,0.1);padding:22px;position:relative;overflow:hidden;transition:border-color 0.3s;}
.card:hover{border-color:rgba(201,168,76,0.28);}
.card-lbl{font-size:8px;letter-spacing:3px;text-transform:uppercase;color:rgba(245,245,240,0.3);margin-bottom:8px;}
.card-val{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1;}
.card-val.g{color:var(--gold);} .card-val.gr{color:var(--green);} .card-val.r{color:var(--red);}
.card-sub{font-size:10px;color:rgba(245,245,240,0.28);margin-top:5px;}
.card-trend{font-size:10px;margin-top:6px;}
.card-trend.up{color:var(--green);} .card-trend.dn{color:var(--red);}
.card-bg{position:absolute;bottom:0;right:0;font-size:56px;opacity:0.04;line-height:1;}

.panel{background:var(--black-2);border:1px solid rgba(201,168,76,0.1);margin-bottom:20px;}
.panel-head{padding:18px 22px;border-bottom:1px solid rgba(201,168,76,0.08);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.panel-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.panel-body{padding:22px;}

.dtable{width:100%;border-collapse:collapse;}
.dtable th{text-align:left;padding:9px 14px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,245,240,0.28);border-bottom:1px solid rgba(201,168,76,0.08);}
.dtable td{padding:11px 14px;font-size:12px;border-bottom:1px solid rgba(201,168,76,0.05);color:rgba(245,245,240,0.7);}
.dtable tr:last-child td{border-bottom:none;}
.dtable tr:hover td{background:rgba(201,168,76,0.02);}

.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:2px;font-size:8px;letter-spacing:2px;text-transform:uppercase;font-weight:600;}
.b-ok{background:rgba(39,174,96,0.15);color:#27ae60;}
.b-pend{background:rgba(201,168,76,0.15);color:var(--gold);}
.b-bad{background:rgba(192,57,43,0.15);color:#c0392b;}
.b-branca{background:rgba(255,255,255,0.08);color:#ddd;}
.b-azul{background:rgba(52,152,219,0.15);color:#3498db;}
.b-roxa{background:rgba(155,89,182,0.15);color:#9b59b6;}
.b-marrom{background:rgba(139,90,43,0.18);color:#a0632a;}
.b-preta{background:rgba(255,255,255,0.04);color:#aaa;border:1px solid #333;}

.g2{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;}

.fat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px;}
.fat-card{padding:18px;background:var(--black-3);border:1px solid rgba(201,168,76,0.08);}
.fat-lbl{font-size:8px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,245,240,0.28);margin-bottom:6px;}
.fat-val{font-family:'Bebas Neue',sans-serif;font-size:30px;}
.fat-val.br{color:var(--white);} .fat-val.ded{color:var(--red);} .fat-val.liq{color:var(--gold);}

.rank-item{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid rgba(201,168,76,0.05);}
.rank-pos{font-family:'Bebas Neue',sans-serif;font-size:22px;width:32px;text-align:center;}
.rank-pos.g{color:var(--gold);} .rank-pos.s{color:#aaa;} .rank-pos.b{color:#a0632a;}
.rank-av{width:36px;height:36px;border-radius:50%;background:var(--black-3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--gold);border:1px solid rgba(201,168,76,0.18);flex-shrink:0;}
.rank-name{flex:1;font-size:13px;}
.rank-count{font-size:11px;color:var(--gold);font-weight:600;}

.checkin-box{text-align:center;padding:44px 24px;background:var(--black-2);border:1px solid rgba(201,168,76,0.1);margin-bottom:20px;}
.checkin-status{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:rgba(245,245,240,0.28);margin-bottom:10px;}
.checkin-status.done{color:var(--green);}
.checkin-status.pend{color:var(--gold);}
.checkin-info{font-size:12px;color:rgba(245,245,240,0.35);margin-bottom:28px;}
.btn-checkin{padding:16px 56px;background:var(--gold);color:var(--black);font-size:12px;letter-spacing:4px;text-transform:uppercase;font-family:'Cinzel',serif;font-weight:700;border:none;cursor:pointer;transition:all 0.3s;clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));}
.btn-checkin:hover{background:var(--gold-light);transform:scale(1.02);}
.btn-checkin:disabled{cursor:default;transform:none;}

.aluno-card{background:var(--black-3);border:1px solid rgba(201,168,76,0.1);padding:14px;margin-bottom:10px;transition:border-color 0.2s;}
.aluno-card:last-child{margin-bottom:0;}
.aluno-card:hover{border-color:rgba(201,168,76,0.25);}
.aluno-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.aluno-av{width:38px;height:38px;border-radius:50%;background:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:var(--white);flex-shrink:0;}
.aluno-info{flex:1;min-width:0;}
.aluno-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.aluno-email{font-size:10px;color:rgba(245,245,240,0.3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.aluno-card-bot{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.aluno-detail{font-size:11px;color:rgba(245,245,240,0.45);}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:500;display:none;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px);}
.modal-bg.on{display:flex;}
.modal-box{background:var(--black-2);border:1px solid rgba(201,168,76,0.25);width:100%;max-width:480px;max-height:90vh;overflow-y:auto;position:relative;}
.modal-head{padding:20px 22px;border-bottom:1px solid rgba(201,168,76,0.1);display:flex;justify-content:space-between;align-items:center;}
.modal-title{font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);letter-spacing:1px;}
.modal-close{background:none;border:none;color:rgba(245,245,240,0.4);font-size:22px;cursor:pointer;line-height:1;padding:0;transition:color 0.2s;}
.modal-close:hover{color:var(--white);}
.modal-body{padding:22px;}
.modal-foot{padding:14px 22px;border-top:1px solid rgba(201,168,76,0.08);display:flex;gap:10px;justify-content:flex-end;}
.btn-danger{padding:10px 20px;background:var(--red);color:var(--white);border:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;transition:opacity 0.2s;}
.btn-danger:hover{opacity:0.85;}
.btn-save{padding:10px 20px;background:var(--gold);color:var(--black);border:none;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;font-weight:700;transition:all 0.2s;}
.btn-save:hover{background:var(--gold-light);}
.btn-ghost{padding:10px 20px;background:transparent;color:rgba(245,245,240,0.4);border:1px solid rgba(245,245,240,0.12);font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold);}

.venc-ok{color:var(--green);font-size:10px;font-weight:600;}
.venc-warn{color:var(--gold);font-size:10px;font-weight:600;}
.venc-bad{color:var(--red);font-size:10px;font-weight:600;}

.aluno-actions{display:flex;gap:8px;margin-top:10px;padding-top:10px;border-top:1px solid rgba(201,168,76,0.07);}
.btn-edit{flex:1;padding:7px;background:transparent;border:1px solid rgba(201,168,76,0.25);color:var(--gold);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-edit:hover{background:rgba(201,168,76,0.08);}
.btn-del{padding:7px 14px;background:transparent;border:1px solid rgba(192,57,43,0.25);color:var(--red);font-size:9px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-del:hover{background:rgba(192,57,43,0.08);}

.avatar-wrap{position:relative;display:inline-block;cursor:pointer;}
.avatar-wrap img{width:36px;height:36px;border-radius:50%;border:2px solid var(--gold);object-fit:cover;}
.avatar-wrap .avatar-edit{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;color:var(--black);}
.avatar-big-wrap{position:relative;display:inline-block;cursor:pointer;margin-bottom:16px;}
.avatar-big-wrap img{width:90px;height:90px;border-radius:50%;border:3px solid var(--gold);object-fit:cover;display:block;}
.avatar-big-wrap .avatar-edit-big{position:absolute;bottom:2px;right:2px;width:24px;height:24px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--black);}
.avatar-upload-input{display:none;}
.avatar-initials{width:36px;height:36px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--black);font-size:13px;flex-shrink:0;}
.avatar-initials-big{width:90px;height:90px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;font-weight:700;color:var(--black);font-size:32px;flex-shrink:0;}

.agenda-day-header{display:flex;align-items:center;gap:10px;margin-bottom:12px;margin-top:18px;}
.agenda-day-label{font-family:'Cinzel',serif;font-size:10px;font-weight:700;color:var(--gold);letter-spacing:2px;text-transform:uppercase;}
.agenda-day-line{flex:1;height:1px;background:rgba(201,168,76,0.12);}
.aula-card{display:flex;align-items:center;gap:14px;padding:12px 14px;background:var(--black-3);border:1px solid rgba(201,168,76,0.08);margin-bottom:8px;transition:border-color 0.2s;}
.aula-card:hover{border-color:rgba(201,168,76,0.22);}
.aula-time{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--gold);line-height:1;min-width:52px;}
.aula-info{flex:1;}
.aula-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.aula-meta{font-size:10px;color:rgba(245,245,240,0.35);}
.aula-nivel{font-size:9px;padding:2px 8px;border-radius:2px;}
.aula-actions-prof{display:flex;gap:6px;margin-left:auto;}
.today-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 10px;background:rgba(201,168,76,0.12);border:1px solid rgba(201,168,76,0.3);font-size:8px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;border-radius:2px;margin-left:8px;}

.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 220px);min-height:300px;}
.chat-msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--black-3);}
.chat-msg{display:flex;flex-direction:column;max-width:75%;}
.chat-msg.mine{align-self:flex-end;align-items:flex-end;}
.chat-msg.theirs{align-self:flex-start;align-items:flex-start;}
.chat-bubble{padding:10px 14px;border-radius:4px;font-size:13px;line-height:1.5;word-break:break-word;}
.chat-msg.mine .chat-bubble{background:var(--gold-dark);color:var(--white);}
.chat-msg.theirs .chat-bubble{background:var(--black-4);color:var(--white);border:1px solid rgba(201,168,76,0.1);}
.chat-meta{font-size:9px;color:rgba(245,245,240,0.28);margin-top:3px;}
.chat-input-wrap{display:flex;gap:8px;padding:12px;background:var(--black-2);border-top:1px solid rgba(201,168,76,0.1);}
.chat-input{flex:1;padding:11px 13px;background:var(--black-3);border:1px solid rgba(201,168,76,0.18);color:var(--white);font-size:13px;font-family:'Inter',sans-serif;outline:none;border-radius:2px;}
.chat-input:focus{border-color:var(--gold);}
.btn-send{padding:11px 18px;background:var(--gold);color:var(--black);border:none;font-size:18px;cursor:pointer;border-radius:2px;transition:opacity 0.2s;-webkit-tap-highlight-color:transparent;}
.btn-send:hover{opacity:0.85;}
.chat-conv-item{display:flex;align-items:center;gap:12px;padding:12px;border-bottom:1px solid rgba(201,168,76,0.06);cursor:pointer;transition:background 0.2s;-webkit-tap-highlight-color:transparent;}
.chat-conv-item:hover,.chat-conv-item.active{background:rgba(201,168,76,0.04);}
.chat-conv-av{width:40px;height:40px;border-radius:50%;background:var(--gold-dark);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0;}
.chat-conv-name{font-size:13px;font-weight:500;}
.chat-conv-preview{font-size:10px;color:rgba(245,245,240,0.35);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px;}
.chat-back{display:none;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;color:var(--gold);font-size:12px;border-bottom:1px solid rgba(201,168,76,0.08);}
.chat-back:hover{background:rgba(201,168,76,0.04);}
.chat-header-name{padding:12px 16px;border-bottom:1px solid rgba(201,168,76,0.08);font-family:'Cinzel',serif;font-size:13px;font-weight:700;color:var(--gold);}

.grad-card{padding:18px;background:var(--black-3);border:1px solid rgba(201,168,76,0.1);margin-bottom:10px;display:flex;align-items:center;gap:14px;transition:border-color 0.2s;}
.grad-card:hover{border-color:rgba(201,168,76,0.25);}
.grad-faixa-strip{width:6px;border-radius:3px;align-self:stretch;flex-shrink:0;}
.grad-body{flex:1;min-width:0;}
.grad-nome{font-size:13px;font-weight:600;margin-bottom:3px;}
.grad-meta{font-size:10px;color:rgba(245,245,240,0.35);}
.grad-actions{display:flex;gap:8px;flex-shrink:0;}

/* PWA banner */
#pwa-banner{display:none;}
#pwa-banner.show{display:flex;}

.prog-wrap{margin-bottom:14px;}
.prog-lbl{display:flex;justify-content:space-between;margin-bottom:5px;font-size:11px;}
.prog-bar{height:3px;background:var(--black-3);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);border-radius:2px;}

.tabs{display:flex;border-bottom:1px solid rgba(201,168,76,0.12);margin-bottom:24px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.tab{padding:11px 22px;cursor:pointer;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:rgba(245,245,240,0.3);transition:all 0.2s;border-bottom:2px solid transparent;margin-bottom:-1px;white-space:nowrap;-webkit-tap-highlight-color:transparent;}
.tab:hover{color:var(--white);}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);}

.alert{padding:12px 18px;margin-bottom:14px;border-left:3px solid var(--gold);background:rgba(201,168,76,0.04);font-size:11px;color:rgba(245,245,240,0.55);}
.alert.warn{border-color:var(--red);background:rgba(192,57,43,0.04);}

.chart-bars{display:flex;align-items:flex-end;gap:6px;height:130px;}
.chart-bw{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;}
.chart-b{width:100%;background:linear-gradient(to top,var(--gold-dark),var(--gold));border-radius:2px 2px 0 0;min-height:3px;transition:height 0.6s ease;}
.chart-b.proj{background:linear-gradient(to top,rgba(201,168,76,0.15),rgba(201,168,76,0.35));border:1px dashed rgba(201,168,76,0.35);}
.chart-lbl{font-size:8px;color:rgba(245,245,240,0.28);}

.dash-input{width:100%;padding:11px 13px;background:var(--black-3);border:1px solid rgba(201,168,76,0.18);color:var(--white);font-size:13px;font-family:'Inter',sans-serif;outline:none;transition:border-color 0.3s;}
.dash-input:focus{border-color:var(--gold);}
.dash-input::placeholder{color:rgba(245,245,240,0.18);}
.form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px;}
.form-grid-2{grid-template-columns:1fr 1fr;}

  .nav{padding:0 14px;height:54px;}

  .stat-num{font-size:38px;}

  .mod-icon{font-size:24px;margin-bottom:8px;}
  .mod-title{font-size:11px;}
  .mod-desc{display:none;}
  .hor-table{display:block;overflow-x:auto;font-size:11px;}
  .cta-sec{padding:48px 16px;}
  footer{flex-direction:column;gap:8px;text-align:center;padding:18px 16px;}
  .login-box{padding:28px 20px;}
  .sidebar{transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);width:272px;z-index:90;}

  .sb-overlay{display:block;}
  .mob-top{display:flex;}

  .dash-main{margin-left:0!important;padding:66px 14px 78px!important;}

  .card-bg{display:none;}
  .panel-head{padding:12px 14px;}

  .dtable{min-width:360px;font-size:11px;}

  .fat-val{font-size:26px;}
  .form-grid,.form-grid-2{grid-template-columns:1fr;}
  .checkin-box{padding:28px 14px;}
  .btn-checkin{padding:14px 28px;font-size:11px;width:100%;max-width:260px;}
  .rank-item{gap:8px;}

  .g2{grid-template-columns:1fr;}
  .chat-wrap{height:calc(100vh - 160px);}
  .chat-msg{max-width:88%;}
}

  .sobre-cards,.mod-grid,.cards{grid-template-columns:1fr;}
  .mob-bot-item{min-width:44px;font-size:8px;}
}
.nav .ham{display:none;}

<script>
// LÓGICA DE NAVEGAÇÃO
function showPage(id) {
  const overlay = document.getElementById('t-overlay');
  overlay.style.opacity = '1';
  overlay.style.pointerEvents = 'all';
  overlay.classList.remove('hide');

  setTimeout(() => {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    setTimeout(() => {
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      overlay.classList.add('hide');
    }, 600);
  }, 400);
}

// INICIALIZAÇÃO
window.addEventListener('DOMContentLoaded', () => {
    atualizarTodasAsLogos();
    const bar = document.getElementById('t-bar-fill');
    if(bar) bar.style.width = '100%';
    
    // Mostra o overlay de entrada e remove após 1.5s
    const overlay = document.getElementById('t-overlay');
    overlay.style.opacity = '1';
    overlay.classList.add('show');

    setTimeout(() => {
      overlay.style.opacity = '0';
      overlay.style.pointerEvents = 'none';
      overlay.classList.add('hide');
    }, 1500);
});
</script>
